<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- GitHub Pages SPA fallback — redirect all 404s to index.html so PWA routes work -->
<script>
  // Preserve the path/query in sessionStorage, then redirect to root
  sessionStorage.setItem('redirect', location.href);
  location.replace('/');
</script>
</head>
<body></body>
</html>
